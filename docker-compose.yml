version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:Root@123456@db:3306/ai_workbench
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-this-in-production
      - QWEN_MODEL_NAME=Qwen/Qwen2.5-1.5B-Instruct
      - EMBEDDING_MODEL_NAME=BAAI/bge-small-zh-v1.5
      - MODEL_DEVICE=cpu
    depends_on:
      - db
      - redis
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Root@123456
      MYSQL_DATABASE: ai_workbench
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
